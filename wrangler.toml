name = "juicebox-mcp"
main = "worker/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

[assets]
directory = "./dist"
binding = "ASSETS"

[[durable_objects.bindings]]
name = "WEBSOCKET_ROOM"
class_name = "WebSocketRoom"

[[migrations]]
tag = "v1"
new_classes = ["WebSocketRoom"]

[vars]
# BROWSER_URL = "https://jbmcp.3dg.io"
TINYURL_DOMAIN = "t.3dg.io"
TINYURL_ENDPOINT = "https://api.tinyurl.com/create"

# Secrets (set via `wrangler secret put`):
# TINYURL_API_KEY
